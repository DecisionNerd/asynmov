name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  python:
    name: Python tests (${{ matrix.os }})
    needs: rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"  # any 3.11–3.13 works; abi3 wheel covers all three
      - name: Install maturin and dev deps
        run: pip install maturin pytest hypothesis polars
      - name: Build wheel and install
        run: |
          maturin build --release --manifest-path crates/asynmov-py/Cargo.toml --out dist
          pip install --no-index --find-links dist asynmov
      - run: pytest tests/ -v

  node:
    name: Node tests (${{ matrix.os }})
    needs: rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli
      - name: Build native module
        working-directory: npm
        run: napi build --platform --manifest-path ../crates/asynmov-node/Cargo.toml
      - name: Run tests
        working-directory: npm
        run: node --test
